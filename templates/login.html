<!DOCTYPE html>
<html>

<head>
<title>Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a; /* dark navy */
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Top Branding */
.brand {
    position: absolute;
    top: 20px;
    left: 30px;
    color: white;
}

.brand h1 {
    margin: 0;
    font-size: 22px;
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: bold;
}

.brand span {
    font-size: 12px;
    color: #94a3b8;
}

/* Glass Card */
.container {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    border-radius: 15px;
    padding: 35px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.1);
}

/* Heading */
h2 {
    color: white;
    margin-bottom: 20px;
}

/* Labels */
label {
    display: block;
    text-align: left;
    font-size: 13px;
    color: #cbd5f5;
    margin-top: 10px;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: white;
    outline: none;
    transition: 0.3s;
}

/* Input focus */
input:focus {
    border-color: #4facfe;
    box-shadow: 0 0 8px rgba(79,172,254,0.5);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

/* Button hover */
button:hover {
    transform: scale(1.03);
    box-shadow: 0 5px 15px rgba(0,242,254,0.4);
}

/* Error */
.error {
    color: #ff6b6b;
    font-size: 13px;
}

/* Link */
a {
    display: block;
    margin-top: 15px;
    color: #4facfe;
    text-decoration: none;
    font-size: 14px;
}

a:hover {
    text-decoration: underline;
}
</style>

</head>

<body>

<!-- Top Left Branding -->
<div class="brand">
    <h1>SkillNova AI</h1>
    <span>Adaptive Skill Assessment & Career Simulation</span>
</div>

<!-- Login Card -->
<div class="container">

<h2>Login</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <p class="error">{{ message }}</p>
    {% endfor %}
  {% endif %}
{% endwith %}

<form method="POST">

<label>Email</label>
<input type="email" name="email" required>

<label>Password</label>
<input type="password" name="password" required>

<button type="submit">Login</button>

</form>

<a href="/register">Create Account</a>

</div>

</body>
</html>
