<!DOCTYPE html>
<html>

<head>
<title>Dashboard</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Top Branding */
.brand {
    position: absolute;
    top: 20px;
    left: 30px;
    color: white;
}

.brand h1 {
    margin: 0;
    font-size: 22px;
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.brand span {
    font-size: 12px;
    color: #94a3b8;
}

/* Glass Card */
.container {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    border-radius: 15px;
    padding: 40px;
    width: 350px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.1);
}

/* Heading */
h2 {
    color: white;
    margin-bottom: 10px;
}

/* Text */
p {
    color: #cbd5f5;
    margin-bottom: 25px;
}

/* Buttons */
button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
    color: white;
}

/* Resume button */
.resume-btn {
    background: linear-gradient(90deg, #4facfe, #00f2fe);
}

.resume-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(0,242,254,0.4);
}

/* Career button */
.career-btn {
    background: linear-gradient(90deg, #43e97b, #38f9d7);
}

.career-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(67,233,123,0.4);
}

/* Logout */
.logout {
    display: block;
    margin-top: 20px;
    color: #94a3b8;
    text-decoration: none;
    font-size: 14px;
}

.logout:hover {
    color: #4facfe;
}
</style>

</head>

<body>

<!-- Branding -->
<div class="brand">
    <h1>SkillNova AI</h1>
    <span>Adaptive Skill Assessment & Career Simulation</span>
</div>

<!-- Dashboard Card -->
<div class="container">

    <h2>Welcome, {{name}}</h2>

    <p>You successfully logged in.</p>

    <a href="/resume">
        <button class="resume-btn">Analyze My Resume</button>
    </a>

    <a href="/career">
        <button class="career-btn">Skip Resume and Select Career</button>
    </a>

    <a href="/logout" class="logout">Logout</a>

</div>

</body>
</html>
